<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocrAItes - 소크라테스식 학습 코치</title>
    <meta name="description" content="AI 소크라테스식 학습 코치와 함께 깊이 있는 학습을 경험하세요.">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <img src="/static/logo.png" alt="SocrAItes Logo" class="logo-img">
                <h1>SocrAItes</h1>
                <p>Learning Coach</p>
            </div>
            
            <div class="settings-group">
                <h3>소크라테스식 깊이</h3>
                <div class="depth-selector">
                    <button class="depth-btn" data-depth="0">Light</button>
                    <button class="depth-btn active" data-depth="1">Standard</button>
                    <button class="depth-btn" data-depth="2">Deep</button>
                </div>
                <p class="depth-desc">질문의 깊이와 반복 횟수를 조절합니다.</p>
            </div>

            <div class="info-group">
                <h3>현재 학습 계획</h3>
                <div id="current-plan" class="plan-card">
                    질문을 입력하면 AI가 학습 계획을 세웁니다.
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="new-chat-btn" class="secondary-btn">새 대화 시작</button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <div class="agent-info">
                    <div class="agent-avatar">S</div>
                    <div>
                        <h2>SocrAItes</h2>
                        <span class="status-indicator">Online</span>
                    </div>
                </div>
            </header>

            <div id="chat-messages" class="messages-container">
                <div class="message ai">
                    <div class="message-content">
                        반갑습니다! 학습하고 싶은 내용이나 궁금한 점을 말씀해 주세요. 함께 답을 찾아가 보겠습니다.
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
                    <button id="send-btn">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M22 2L11 13M22 2L15 22L11 13M11 13L2 9L22 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <p class="input-tip">Shift + Enter로 줄바꿈</p>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
